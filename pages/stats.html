<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">

    <link rel="icon" type="image/png" href="/MyJot/favicons/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/MyJot/favicons/favicon.svg" />
    <link rel="shortcut icon" href="/MyJot/favicons/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/MyJot/favicons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="MyJot" />
    <link rel="manifest" href="/MyJot/myjot.json" />

    <!-- Custom metadata: defines page-specific CSS and JS resources to load via a comma‑separated list. Failures are unhandled to ensure fast failure -->
    <meta data-custom-stylesheets="/MyJot/css/site/stats/stats.css">
    <meta data-custom-scripts="/MyJot/js/site/stats/statsScripts.js,/MyJot/js/site/stats/apexcharts.min.js">

    <!-- Optional custom metadata: defines any page-specific components to include via a comma‑separated list. Failures are unhandled to ensure fast failure -->
    <meta data-custom-shared-components="navbar">

    <title>Stats</title>

    <!-- Import the shared app setup script to dynamically add the necessary site CSS/JS and vendor CSS/JS to the document head. -->
    <script type="module" src="/MyJot/js/site/shared/SharedAppSetup.js"></script>
  </head>
  <body>
    <div class="container" id="stats-page-container">
      <header class="d-flex flex-column align-items-center mb-5">
        <div class="alert alert-danger mb-5 d-none" id="stats-validation-errors-alert" role="alert"></div>
        <h1 class="align-self-xl-start">Stats</h1>
      </header>
      <section>
        <div class="segmented-control-component mb-5 d-none">
          <div class="segmented-control-button selected-segment-control" id="today-segmented-control-button">
            Today
          </div>
          <div class="segmented-control-button" id="this-week-segmented-control-button">
            This Week
          </div>
        </div>
        <main>
          <div class="d-flex justify-content-center" id="loader-container">
            <span class="loader"></span>
          </div>
          <section class="reporting-modules-container d-none" id="daily-reports">
            <div class="reporting-module" id="todays-calories-report">
              <div>
                <small>Calories Eaten</small>
                <h1><span id="todays-calories-report-calories-eaten"></span> cal 
                  <small class="fw-normal intake-limit d-none"><span class="user-set-daily-target"></span></small>
                </h1>
                <div class="progress d-none" role="progressbar" aria-label="Today's eaten calorie count">
                  <div class="progress-bar progress-bar-striped" style="width: 10%"></div>
                </div>
              </div>
            </div>
            <div class="reporting-module" id="todays-protein-report">
              <div>
                <small>Protein Eaten</small>
                <h1>
                  <span id="todays-protein-report-protein-eaten"></span> g 
                  <small class="fw-normal intake-limit d-none"><span class="user-set-daily-target"></span></small>
                </h1>
                <div class="progress d-none" role="progressbar" aria-label="Today's eaten protein count">
                  <div class="progress-bar progress-bar-striped bg-protein" style="width: 10%"></div>
                </div>
              </div>
            </div>
            <div class="reporting-module" id="todays-fats-report">
              <div>
                <small>Fats Eaten</small>
                <h1>
                  <span id="todays-fats-report-fats-eaten"></span> g 
                  <small class="fw-normal intake-limit d-none"><span class="user-set-daily-target"></span></small>
                </h1>
                <div class="progress d-none" role="progressbar" aria-label="Today's eaten fats count">
                  <div class="progress-bar progress-bar-striped bg-fat" style="width: 10%"></div>
                </div>
              </div>
            </div>
            <div class="reporting-module" id="todays-carbs-report">
              <div>
                <small>Carbs Eaten</small>
                <h1>
                  <span id="todays-carbs-report-carbs-eaten"></span> g 
                  <small class="fw-normal intake-limit d-none"><span class="user-set-daily-target"></span></small>
                </h1>
                <div class="progress d-none" role="progressbar" aria-label="Today's eaten carbs count">
                  <div class="progress-bar progress-bar-striped bg-carbs" style="width: 10%"></div>
                </div>
              </div>
            </div>
            <div class="reporting-module" id="todays-calories-burned-report">
              <div>
                <small>Calories Burned</small>
                <h1 class="mb-0">
                  <span id="todays-calories-burned-report-calories-burned"></span> cal 🔥
                </h1>
              </div>
            </div>
          </section>
          <section class="reporting-modules-container d-none" id="weekly-reports">
            <div class="reporting-module reporting-module-apex-chart" id="weekly-weight-tracker-report">
              <div>
                <h5>Weight Changes</h5>
                <div id="weight-tracker-chart"></div>
              </div>
            </div>
            <div class="reporting-module reporting-module-apex-chart" id="weekly-calories-eaten-report">
              <div>
                <h5>Caloric Intake</h5>
                <div id="calories-eaten-chart"></div>
              </div>
            </div>
          </section>
        </main>
      </section>
    </div>
  </body>
</html>
